name: CI/CD Self-Hosted

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: organaizer-pills-bot-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: CI checks
    runs-on: self-hosted
    steps:
      - name: Clean previous workspace
        shell: bash
        run: |
          WORK_DIR="${RUNNER_WORKSPACE}/organaizer-pills-bot"
          if [ -d "$WORK_DIR" ]; then
            echo "Attempting to clean $WORK_DIR"
            sudo chmod -R 777 "$WORK_DIR/data" 2>/dev/null || true
            sudo rm -rf "$WORK_DIR/data" 2>/dev/null || true
            rm -rf "$WORK_DIR/data" 2>/dev/null || true
            echo "Cleaned."
          fi

      - name: Debug environment
        shell: bash
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== Git version ==="
          git --version
          echo "=== Network check ==="
          ping -c 2 github.com || echo "GitHub unreachable"
          echo "=== Disk space ==="
          df -h / | head -2
          echo "=== Working directory ==="
          pwd
          ls -la

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create temporary .env for CI
        shell: bash
        run: |
          {
            printf 'BOT_TOKEN=%s\n' '123456789:abcdefghijklmnopqrstuvwxyzABCDE'
            printf 'BOT_TIMEZONE=%s\n' 'Europe/Moscow'
          } > .env

      - name: Check Docker Compose file
        run: docker compose config

      - name: Build image
        run: docker compose build

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from GitHub Secrets
        shell: bash
        run: |
          BOT_TOKEN_CLEAN="$(printf '%s' "${{ secrets.BOT_TOKEN }}" | tr -d '\r\n')"
          BOT_TIMEZONE_CLEAN="$(printf '%s' "${{ secrets.BOT_TIMEZONE }}" | tr -d '\r\n')"
          {
            printf 'BOT_TOKEN=%s\n' "$BOT_TOKEN_CLEAN"
            printf 'BOT_TIMEZONE=%s\n' "$BOT_TIMEZONE_CLEAN"
          } > .env

      - name: Validate BOT_TOKEN format
        shell: bash
        run: |
          TOKEN="$(grep '^BOT_TOKEN=' .env | cut -d '=' -f2-)"
          if ! printf '%s' "$TOKEN" | grep -Eq '^[0-9]{8,10}:[A-Za-z0-9_-]{35}$'; then
            echo "BOT_TOKEN has invalid format. Check GitHub secret BOT_TOKEN."
            exit 1
          fi

      - name: Deploy with Docker Compose
        run: docker compose up -d --build

      - name: Cleanup dangling images
        run: docker image prune -f
